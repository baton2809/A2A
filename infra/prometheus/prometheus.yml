global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector re-экспортирует все метрики Gateway (gw_*) в Prometheus-формате.
  # Gateway шлёт метрики → OTel (gRPC:4317) → Prometheus exporter (:8889).
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: /metrics
